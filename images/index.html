<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深層心理・闇観測実験アーカイブ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Zen+Kurenaido&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scan-line"></div>
    <div class="background-overlay"></div>

    <main class="container">
        <!-- スタート画面 -->
        <section id="start-screen" class="screen active">
            <div class="logo-area">
                <i class="fa-solid fa-flask fa-beat-fade" style="font-size: 3rem; color: #00ffcc;"></i>
                <h1>深層心理<br>闇観測実験<br>アーカイブ</h1>
                <p class="sub-text">Subject ID: <span id="user-id">UNKNOWN</span></p>
            </div>
            <div class="warning-box">
                <p>⚠️ 警告 ⚠️</p>
                <p>本実験は被験者の「深層心理の歪み」および<br>
                「構造的理解度」を測定します。<br>
                回答内容だけでなく、<br>
                <strong>入力速度・迷い・修正行動</strong>も<br>
                全て観測対象となります。</p>
            </div>
            <button class="btn start-btn" onclick="startExperiment()">観測開始 <i class="fa-solid fa-dna"></i></button>
            <button class="btn sub-btn" onclick="showArchive('start-screen')">アーカイブ閲覧 <i class="fa-solid fa-book-medical"></i></button>
        </section>

        <!-- 実験（質問）画面 -->
        <section id="quiz-screen" class="screen">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            
            <div class="question-box">
                <h2 id="q-text">質問テキスト</h2>
                <div id="image-area" class="hidden"></div>
                <div id="input-area"></div>
            </div>

            <div class="nav-buttons">
                <button id="back-btn" class="nav-btn" onclick="goBack()" disabled><i class="fa-solid fa-arrow-left"></i> 戻る</button>
                <div class="observation-log">
                    <p><i class="fa-solid fa-eye"></i> 観測中... <span id="timer-display">0.00s</span></p>
                </div>
            </div>
        </section>

        <!-- 解析ロード画面 -->
        <section id="loading-screen" class="screen">
            <div class="loading-content">
                <i class="fa-solid fa-microchip fa-spin" style="font-size: 4rem; color: #00ffcc;"></i>
                <h2 class="glitch-text">DATA ANALYZING...</h2>
                <p id="loading-text">思考ノイズ除去中...</p>
            </div>
        </section>

        <!-- 結果画面 -->
        <section id="result-screen" class="screen">
            <div class="result-header">
                <i class="fa-solid fa-clipboard-check"></i> 観測レポート
            </div>
            
            <div class="result-content">
                <div class="chara-img-box">
                    <img id="result-img" src="" alt="Subject Image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="chara-img-placeholder" style="display:none">
                        <i class="fa-solid fa-user-secret" style="font-size: 3rem; color: #555;"></i>
                    </div>
                </div>

                <h2 id="result-type-name">タイプ名</h2>
                <div class="quote-box">
                    <i class="fa-solid fa-quote-left"></i>
                    <span id="result-quote">セリフ</span>
                    <i class="fa-solid fa-quote-right"></i>
                </div>
                
                <!-- パラメーター -->
                <div class="radar-box" id="stats-list"></div>

                <div class="description-box">
                    <p id="result-desc">説明文</p>
                </div>

                <div class="character-match">
                    <h3><i class="fa-solid fa-fingerprint"></i> 類似検体データ</h3>
                    <div id="match-chara-detail"></div>
                </div>
            </div>

            <div class="action-buttons">
                <!-- シェアアイコン変更 -->
                <button class="btn share-btn" onclick="shareResult()"><i class="fa-solid fa-share-nodes"></i> 結果をシェア</button>
                <button class="btn retry-btn" onclick="location.reload()">再観測 <i class="fa-solid fa-rotate-right"></i></button>
                <button class="btn sub-btn" onclick="showArchive('result-screen')">全検体リスト <i class="fa-solid fa-list"></i></button>
            </div>
        </section>

        <!-- アーカイブ（一覧）画面 -->
        <section id="archive-screen" class="screen">
            <h2><i class="fa-solid fa-database"></i> 検体アーカイブ</h2>
            <div id="archive-list" class="archive-container"></div>
            <button class="btn" onclick="backFromArchive()">戻る</button>
        </section>

        <!-- アーカイブ詳細モーダル（ここに追加！） -->
        <div id="modal-container"></div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
