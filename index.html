<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 基本のメタタグ -->
    <title>闇観測実験アーカイブ｜病み系・ダークな深層心理テスト＆性格診断</title>
    <meta name="description" content="あなたの深層心理に潜む「闇の構造」を観測する実験です。入力行動や迷いまで解析し、全40以上のパラメーターからあなたのタイプを割り出します。">
    
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- OGP (SNSシェア用設定) -->
    <meta property="og:url" content="https://mofu-mitsu.github.io/yami_kansoku_archive/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="深層心理・闇観測実験アーカイブ">
    <meta property="og:description" content="闇観測実験アーカイブ。あなたの深層心理と闇の質を解析します。">
    <meta property="og:image" content="https://mofu-mitsu.github.io/yami_kansoku_archive/images/ogp.png">
    
    <!-- Twitter(X)カード設定 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="深層心理・闇観測実験アーカイブ">
    <meta name="twitter:description" content="あなたの深層心理に潜む「闇の構造」を観測する実験です。">
    <meta name="twitter:image" content="https://mofu-mitsu.github.io/yami_kansoku_archive/images/ogp.png">

    <!-- フォント & CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Zen+Kurenaido&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scan-line"></div>
    <div class="background-overlay"></div>
    
    <!-- ★NEW: ホームボタン（idを追加） -->
    <a href="https://mofu-mitsu.github.io/" class="home-btn" id="home-link" onclick="handleHomeClick(event)">
        <i class="fa-solid fa-door-open"></i> LAB EXIT
    </a>

    <main class="container">
        <!-- スタート画面 -->
        <section id="start-screen" class="screen active">
            <!-- (前回と同じ) -->
            <div class="logo-area">
                <i class="fa-solid fa-flask fa-beat-fade" style="font-size: 3rem; color: #00ffcc;"></i>
                <h1>深層心理<br>闇観測実験<br>アーカイブ</h1>
                <p class="sub-text">Subject ID: <span id="user-id">UNKNOWN</span></p>
            </div>
            <div class="warning-box">
                <p>⚠️ 警告 ⚠️</p>
                <p>本実験は回答内容だけでなく、<br>
                <strong>入力速度・迷い・修正行動</strong>も<br>
                全て観測対象となります。</p>
            </div>
            <button class="btn start-btn" onclick="startExperiment()">観測開始 <i class="fa-solid fa-dna"></i></button>
            <button class="btn sub-btn" onclick="showArchive('start-screen')">アーカイブ閲覧 <i class="fa-solid fa-book-medical"></i></button>
        </section>

        <!-- 実験（質問）画面 -->
        <section id="quiz-screen" class="screen">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div class="question-box">
                <h2 id="q-text">質問テキスト</h2>
                <div id="image-area" class="hidden"></div>
                <div id="input-area"></div>
            </div>
            <div class="nav-buttons">
                <button id="back-btn" class="nav-btn" onclick="goBack()" disabled><i class="fa-solid fa-arrow-left"></i> 戻る</button>
                <div class="observation-log">
                    <p><i class="fa-solid fa-eye"></i> 観測中... <span id="timer-display">0.00s</span></p>
                </div>
            </div>
        </section>

        <!-- 解析ロード画面 -->
        <section id="loading-screen" class="screen">
            <div class="loading-content">
                <i class="fa-solid fa-microchip fa-spin" style="font-size: 4rem; color: #00ffcc;"></i>
                <h2 class="glitch-text">DATA ANALYZING...</h2>
                <p id="loading-text">思考ノイズ除去中...</p>
            </div>
        </section>

        <!-- 結果画面 -->
        <section id="result-screen" class="screen">
            <div class="result-header">
                <i class="fa-solid fa-clipboard-check"></i> 観測レポート
            </div>
            
            <div class="result-content" id="capture-area">
                <!-- ★ アイコン部分修正 ★ -->
                <div class="chara-img-box" id="result-img-box">
                    <i class="fa-solid fa-user-secret dummy-icon" id="dummy-icon" style="display:none;"></i>
                </div>

                <h2 id="result-type-name">タイプ名</h2>
                <div class="quote-box">
                    <i class="fa-solid fa-quote-left"></i>
                    <span id="result-quote">セリフ</span>
                    <i class="fa-solid fa-quote-right"></i>
                </div>
                
                <!-- パラメーター -->
                <div class="radar-box" id="stats-list"></div>

                <div class="description-box">
                    <p id="result-desc">説明文</p>
                </div>

                <div class="character-match">
                    <h3><i class="fa-solid fa-fingerprint"></i> 類似検体データ</h3>
                    <div id="match-chara-detail"></div>
                </div>

                <!-- ★NEW: 観測ログ出力エリア★ -->
                <div class="observation-report">
                    <h3><i class="fa-solid fa-eye"></i> 裏観測ログ</h3>
                    <ul id="hidden-log-list"></ul>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn save-btn" onclick="saveResultImage()" style="border-color: #ff00ff; color: #ff00ff;"><i class="fa-solid fa-download"></i> 結果を画像保存</button>
                <button class="btn share-btn" onclick="shareResult()"><i class="fa-solid fa-share-nodes"></i> URLをシェア</button>
                <button class="btn retry-btn" onclick="location.reload()">再観測 <i class="fa-solid fa-rotate-right"></i></button>
                <button class="btn sub-btn" onclick="showArchive('result-screen')">全検体リスト <i class="fa-solid fa-list"></i></button>
            </div>
        </section>

        <!-- アーカイブ（一覧）画面 -->
        <section id="archive-screen" class="screen">
            <h2><i class="fa-solid fa-database"></i> 検体アーカイブ</h2>
            <div id="archive-list" class="archive-container"></div>
            <button class="btn" onclick="backFromArchive()">戻る</button>
        </section>
        <div id="modal-container"></div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
